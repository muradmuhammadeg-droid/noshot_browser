<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>NoShot Browser</title>
    <style>
        /* Base Reset & Core Windows Layout */
        body {
            margin: 0;
            padding: 0;
            background-color: #f1f3f4; /* Chrome standard light gray */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* 1. Chrome Tab Bar Strip with Window Drag Support */
        .tab-strip {
            display: flex;
            align-items: flex-end;
            background-color: #dee1e6; /* Chrome tab header track */
            padding-left: 8px;
            padding-top: 8px;
            height: 32px;
            -webkit-app-region: drag; /* Allows clicking and dragging the application window */
        }
        .chrome-tab {
            background-color: #ffffff;
            color: #3c4043;
            padding: 6px 30px 6px 16px;
            font-size: 12px;
            border-radius: 8px 8px 0 0;
            width: 160px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            position: relative;
            box-shadow: 0 -1px 2px rgba(0,0,0,0.05);
            -webkit-app-region: no-drag; /* Restores selectability on the tab itself */
        }
        .chrome-tab-close {
            position: absolute;
            right: 8px;
            top: 8px;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            text-align: center;
            line-height: 14px;
            font-size: 10px;
            color: #5f6368;
            cursor: pointer;
            -webkit-app-region: no-drag;
        }
        .chrome-tab-close:hover {
            background-color: #e8eaed;
            color: #202124;
        }

        /* 2. Chrome Navigation Toolbar Container */
        .nav-bar {
            display: flex;
            background-color: #ffffff;
            padding: 8px;
            gap: 12px;
            align-items: center;
            border-bottom: 1px solid #dadce0;
            height: 28px;
            -webkit-app-region: no-drag; /* Buttons and fields must be interactive */
        }
        
        /* Circular Material Navigation Buttons */
        .nav-btn {
            background: none;
            border: none;
            color: #5f6368;
            font-size: 16px;
            cursor: pointer;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.15s;
        }
        .nav-btn:hover {
            background-color: #f1f3f4;
            color: #202124;
        }
        .nav-btn:disabled {
            color: #c0c4cc;
            cursor: not-allowed;
            background: none;
        }

        /* Pill-Shaped Chrome Address Input Bar */
        .address-bar-container {
            flex-grow: 1;
            display: flex;
            align-items: center;
            background-color: #f1f3f4;
            border-radius: 20px; /* Gives it the circular capsule edge */
            padding: 0 16px;
            height: 28px;
            border: 1px solid transparent;
            transition: background-color 0.15s, border-color 0.15s, box-shadow 0.15s;
        }
        .address-bar-container:focus-within {
            background-color: #ffffff;
            border-color: #dadce0;
            box-shadow: 0 1px 3px rgba(60,64,67,0.15);
        }
        input {
            width: 100%;
            border: none;
            background: none;
            color: #202124;
            font-size: 14px;
            outline: none;
        }

        /* 3. The Isolated Web Canvas Frame */
        webview {
            flex-grow: 1;
            background: #ffffff;
            border: none;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>

    <!-- Chrome Tab Strip Component -->
    <div class="tab-strip">
        <div class="chrome-tab" id="active-tab">
            <span id="tab-title">Google</span>
            <div class="chrome-tab-close">×</div>
        </div>
    </div>

    <!-- Navigation & Capsule Bar Component -->
    <div class="nav-bar">
        <button class="nav-btn" id="back" title="Click to go back" disabled>⭠</button>
        <button class="nav-btn" id="forward" title="Click to go forward" disabled>⭢</button>
        <button class="nav-btn" id="reload" title="Reload page">⭮</button>
        
        <div class="address-bar-container">
            <input type="text" id="url-bar" value="https://google.com" autocomplete="off">
        </div>
    </div>
    
    <!-- Main High-Performance Isolated Chromium Renderer Layer -->
    <webview id="web-container" src="https://google.com"></webview>

    <script>
        // DOM Element Selectors
        const webView = document.getElementById('web-container');
        const urlBar = document.getElementById('url-bar');
        const tabTitle = document.getElementById('tab-title');
        const btnBack = document.getElementById('back');
        const btnForward = document.getElementById('forward');

        // Helper function to format input values into proper web URLs or search queries
        function loadUrlFromInput() {
            let url = urlBar.value.trim();
            if (!url.startsWith('http://') && !url.startsWith('https://')) {
                // Check if it's a valid domain format without spaces, else perform Google Search
                if (url.includes('.') && !url.includes(' ')) {
                    url = 'https://' + url;
                } else {
                    url = 'https://google.com' + encodeURIComponent(url);
                }
            }
            webView.src = url;
        }

        // Helper function to update state of Back and Forward buttons dynamically
        function updateNavigationButtons() {
            btnBack.disabled = !webView.canGoBack();
            btnForward.disabled = !webView.canGoForward();
        }

        // Navigation UI Listeners
        document.getElementById('reload').addEventListener('click', () => { webView.reload(); });
        btnBack.addEventListener('click', () => { if (webView.canGoBack()) webView.goBack(); });
        btnForward.addEventListener('click', () => { if (webView.canGoForward()) webView.goForward(); });

        // Address Bar Interactivity
        urlBar.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                loadUrlFromInput();
                urlBar.blur(); 
            }
        });
        
        // Auto-select text context when clicking inside the URL bar
        urlBar.addEventListener('click', () => { urlBar.select(); });

        // Link Interceptor: Forces links targeting new windows/tabs to open inside the frame
        webView.addEventListener('new-window', (event) => {
            webView.src = event.url;
        });

        // Synchronization Events (Listens to the active background WebView runtime)
        webView.addEventListener('did-start-loading', () => {
            tabTitle.textContent = "Loading...";
        });

        webView.addEventListener('did-navigate', (event) => {
            urlBar.value = event.url;
            updateNavigationButtons();
        });

        webView.addEventListener('did-navigate-in-page', (event) => {
            urlBar.value = event.url; // Updates hash routing or single page application history (e.g. YouTube)
            updateNavigationButtons();
        });

        webView.addEventListener('page-title-updated', (event) => {
            tabTitle.textContent = event.title;
        });

        // Fallback check to update button states when page completely settles loading
        webView.addEventListener('did-stop-loading', () => {
            updateNavigationButtons();
        });
    </script>
</body>
</html>
